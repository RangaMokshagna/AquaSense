services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: aquasense-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_DATABASE: aquasense
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node.js Backend
  backend:
    build: .
    container_name: aquasense-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/aquasense
      ML_SERVICE_URL: http://ml-service:8000
      API_KEY: changeme
      FRONTEND_URL: "http://localhost:3000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Python ML Placeholder Service
  ml-service:
    image: python:3.11-slim
    container_name: aquasense-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./scripts/ml_placeholder.py:/app/ml_placeholder.py:ro
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn pydantic --quiet &&
             uvicorn ml_placeholder:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # React Dashboard
  dashboard:
    build:
      context: ../aquasense-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: changeme
    container_name: aquasense-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
  backend_logs:
